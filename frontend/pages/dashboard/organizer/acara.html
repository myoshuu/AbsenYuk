<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acara - Organizer - AbsenYuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../styles/dashboard.css" />
</head>
<body class="is-loading" data-role="router" data-page="organizer-acara">
  <div class="bg-noise"></div>

  <div class="loading-overlay" aria-live="polite">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <p>Memuat dashboard...</p>
    </div>
  </div>

  <div class="dashboard">
    <aside class="sidebar">
      <div class="profile">
        <div class="avatar" id="sidebarAvatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c2.2-3.2 5-4.8 8-4.8s5.8 1.6 8 4.8" />
          </svg>
        </div>
        <div class="profile-text">
          <p class="profile-name" id="profileName">Hi, Organizer</p>
          <p class="profile-role" id="profileRole">Penyelenggara</p>
        </div>
      </div>
      <div class="divider"></div>
      <nav class="side-nav" id="sideNav" aria-label="Menu dashboard"></nav>
      <div class="divider"></div>
      <div class="side-actions">
        <button class="side-link" type="button" data-action="home"><span class="side-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></span><span>Home</span></button>
        <button class="side-link side-logout" type="button" data-action="logout"><span class="side-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/><path d="M13 7V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h6a2 2 0 002-2v-2"/></svg></span><span>Log Out</span></button>
      </div>
    </aside>

    <main class="main">
      <header class="main-header">
        <div>
          <h1 class="welcome-title" id="welcomeTitle">Acara Saya</h1>
          <p class="welcome-subtitle" id="welcomeSubtitle">Kelola acara yang Anda buat.</p>
        </div>
        <div class="header-icon" id="headerIcon" aria-hidden="true"></div>
      </header>
      <div class="header-line"></div>
      <section class="role-panel">
        <div class="section-header">
          <h2 class="section-title">Daftar Acara</h2>
          <button class="user-create" id="orgAcaraCreateBtn" type="button">Buat Acara</button>
        </div>
        <div class="acara-list org-acara-grid" id="orgAcaraList"></div>
        <p class="user-empty" id="orgAcaraEmpty">Belum ada acara yang dibuat.</p>
      </section>
    </main>
  </div>

  <script src="../../../scripts/config.js"></script>
  <script src="../../../scripts/dashboard.js"></script>
</body>
</html>
