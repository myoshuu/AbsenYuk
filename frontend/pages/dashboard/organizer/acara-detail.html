<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Acara - AbsenYuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../styles/dashboard.css" />
</head>
<body class="is-loading" data-role="router" data-page="acara-detail">
  <div class="bg-noise"></div>
  <div class="loading-overlay" aria-live="polite">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <p>Memuat...</p>
    </div>
  </div>
  <div class="dashboard">
    <div class="sidebar-host"></div>
    <main class="main">
      <header class="main-header">
        <div>
          <h1 class="welcome-title" id="acaraDetailTitle">Detail Acara</h1>
          <p class="welcome-subtitle" id="acaraDetailSubtitle">Informasi dan diskusi acara.</p>
        </div>

      </header>
      <div class="header-line"></div>
      <section class="role-panel">

        <!-- Back button -->
        <button class="acara-detail-back" id="acaraDetailBack" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
          Kembali
        </button>

        <!-- Info Banner -->
        <div class="acara-detail-banner" id="acaraDetailBanner" style="display:none">
          <div class="acara-detail-banner-top">
            <h2 class="acara-detail-judul" id="detailJudul">-</h2>
            <span class="acara-detail-status" id="detailStatusBadge">-</span>
          </div>
          <div class="acara-detail-info">
            <div class="acara-detail-row"><span class="acara-detail-label">Pembuat</span><span class="acara-detail-value" id="detailCreator">-</span></div>
            <div class="acara-detail-row"><span class="acara-detail-label">Lokasi</span><span class="acara-detail-value" id="detailLokasi">-</span></div>
            <div class="acara-detail-row"><span class="acara-detail-label">Mulai</span><span class="acara-detail-value" id="detailMulai">-</span></div>
            <div class="acara-detail-row"><span class="acara-detail-label">Akhir</span><span class="acara-detail-value" id="detailAkhir">-</span></div>
            <div class="acara-detail-row"><span class="acara-detail-label">Maks. Peserta</span><span class="acara-detail-value" id="detailMaks">-</span></div>
            <div class="acara-detail-row"><span class="acara-detail-label">Peserta Ikut</span><span class="acara-detail-value" id="detailPeserta">-</span></div>
          </div>
        </div>

        <!-- Ikuti Acara (for non-participants) -->
        <div class="acara-join-card" id="acaraJoinCard" style="display:none">
          <p class="acara-join-text">Ikuti acara ini untuk bergabung dalam diskusi.</p>
          <button class="modal-btn primary" id="acaraJoinBtn" type="button">Ikuti Acara</button>
        </div>

        <!-- Forum Diskusi -->
        <div id="forumSection" style="display:none">
          <h2 class="section-title" style="margin-top:24px">Diskusi</h2>

          <!-- Create Post (only for organizer/owner) -->
          <button class="user-create" id="forumCreateBtn" type="button" style="margin-bottom:16px">Buat Diskusi</button>

          <!-- Posts List -->
          <div id="forumPosts"></div>
          <p class="user-empty" id="forumEmpty">Belum ada diskusi. Mulailah diskusi pertama!</p>
        </div>

      </section>
    </main>
  </div>
  <script src="../../../scripts/config.js"></script>
  <script src="../../../scripts/shared.js"></script>
  <script src="../../../scripts/api.js"></script>
  <script src="../../../scripts/modal-factory.js"></script>
  <script src="../../../scripts/navbar.js"></script>
  <script src="../../../scripts/dashboard-home.js"></script>
  <script src="../../../scripts/user-manager.js"></script>
  <script src="../../../scripts/acara-manager.js"></script>
  <script src="../../../scripts/absensi-manager.js"></script>
  <script src="../../../scripts/logs-manager.js"></script>
  <script src="../../../scripts/profile.js"></script>
  <script src="../../../scripts/forum.js"></script>
  <script src="../../../scripts/dashboard.js"></script>
</body>
</html>
