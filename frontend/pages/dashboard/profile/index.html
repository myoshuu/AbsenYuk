<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil - AbsenYuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../styles/dashboard.css" />
</head>
<body class="is-loading" data-role="router" data-page="profile">
  <div class="bg-noise"></div>

  <div class="loading-overlay" aria-live="polite">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <p>Memuat dashboard...</p>
    </div>
  </div>

  <div class="dashboard">
    <aside class="sidebar">
      <div class="profile">
        <div class="avatar" id="sidebarAvatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c2.2-3.2 5-4.8 8-4.8s5.8 1.6 8 4.8" />
          </svg>
        </div>
        <div class="profile-text">
          <p class="profile-name" id="profileName">Hi, User</p>
          <p class="profile-role" id="profileRole">Anggota</p>
        </div>
      </div>

      <div class="divider"></div>

      <nav class="side-nav" id="sideNav" aria-label="Menu dashboard"></nav>

      <div class="divider"></div>

      <div class="side-actions">
        <button class="side-link" type="button" data-action="home">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M3 11l9-8 9 8" /><path d="M5 10v10h14V10" /><path d="M9 20v-6h6v6" />
            </svg>
          </span>
          <span>Home</span>
        </button>
        <button class="side-link" type="button" data-action="exit">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M10 6h8v12h-8" /><path d="M6 12h12" /><path d="M6 12l3-3" /><path d="M6 12l3 3" />
            </svg>
          </span>
          <span>Exit</span>
        </button>
        <button class="side-link side-logout" type="button" data-action="logout">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M16 17l5-5-5-5" /><path d="M21 12H9" /><path d="M13 7V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h6a2 2 0 002-2v-2" />
            </svg>
          </span>
          <span>Log Out</span>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="main-header">
        <div>
          <h1 class="welcome-title" id="welcomeTitle">Profil</h1>
          <p class="welcome-subtitle" id="welcomeSubtitle">Kelola informasi akun Anda.</p>
        </div>
        <div class="header-icon" id="headerIcon" aria-hidden="true"></div>
      </header>

      <div class="header-line"></div>

      <section class="role-panel">
        <!-- Profile Header -->
        <div class="profile-header-card">
          <div class="profile-avatar-wrapper">
            <div class="profile-avatar-large" id="profileAvatarLarge" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.6">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c2.2-3.2 5-4.8 8-4.8s5.8 1.6 8 4.8" />
              </svg>
            </div>
            <button class="avatar-change-btn" type="button" title="Ganti foto profil" id="changeAvatarBtn">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
            <input type="file" id="avatarFileInput" accept="image/jpeg,image/png,image/webp" hidden />
          </div>
          <div>
            <p class="profile-display-name" id="profileDisplayName">-</p>
            <p class="profile-display-id" id="profileDisplayId">id: -</p>
          </div>
        </div>

        <!-- Account Information -->
        <h2 class="section-title">Informasi Akun</h2>
        <div class="card profile-info-card">
          <div class="profile-info-row">
            <p class="profile-info-label">Username</p>
            <p class="profile-info-value" id="infoUsername">-</p>
          </div>
          <div class="profile-info-row">
            <p class="profile-info-label">Email</p>
            <p class="profile-info-value" id="infoEmail">-</p>
          </div>
          <div class="profile-info-row">
            <p class="profile-info-label">Role</p>
            <p class="profile-info-value" id="infoRole">-</p>
          </div>
        </div>

        <!-- Additional -->
        <h2 class="section-title">Tambahan</h2>
        <div class="profile-actions">
          <button class="profile-action-btn" type="button" id="changeUsernameBtn">
            <span class="profile-action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 20h4l10-10-4-4L4 16v4z" /><path d="M14 6l4 4" />
              </svg>
            </span>
            Change Username
          </button>
          <button class="profile-action-btn" type="button" id="changePasswordBtn">
            <span class="profile-action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
            </span>
            Change Password
          </button>
          <button class="profile-action-btn profile-action-danger" type="button" id="deleteAccountBtn">
            <span class="profile-action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M3 6h18" /><path d="M8 6V4h8v2" /><path d="M8 10v8M12 10v8M16 10v8" />
              </svg>
            </span>
            Delete Account
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="../../../scripts/config.js"></script>
  <script src="../../../scripts/dashboard.js"></script>
</body>
</html>
