<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Absensi - AbsenYuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../styles/dashboard.css" />
</head>
<body class="is-loading" data-role="router" data-page="absensi-logs">
  <div class="bg-noise"></div>

  <div class="loading-overlay" aria-live="polite">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <p>Memuat dashboard...</p>
    </div>
  </div>

  <div class="dashboard">
    <div class="sidebar-host"></div>

    <main class="main">
      <!-- Breadcrumb Navigation -->
      <nav class="breadcrumb" aria-label="Breadcrumb"></nav>

      <header class="main-header">
        <div>
          <h1 class="welcome-title" id="welcomeTitle">Log Absensi</h1>
          <p class="welcome-subtitle" id="welcomeSubtitle">Kelola seluruh data kehadiran peserta.</p>
        </div>

      </header>

      <div class="header-line"></div>

      <section class="role-panel">
        <div class="section-header">
          <h2 class="section-title">Riwayat Absensi</h2>
          <div class="user-search">
            <div class="acara-filter-wrap">
              <select id="logsAcaraFilter" class="acara-status-filter" style="max-width:240px">
                <option value="">Semua Acara</option>
              </select>
            </div>
            <div class="acara-filter-wrap">
              <select id="logsStatusFilter" class="acara-status-filter" style="max-width:160px">
                <option value="">Semua Status</option>
                <option value="hadir">Hadir</option>
                <option value="sakit">Sakit</option>
                <option value="izin">Izin</option>
                <option value="tanpa keterangan">Tanpa Keterangan</option>
              </select>
            </div>
            <button class="user-create" id="logsAddBtn" type="button">Tambah Log</button>
            <div class="export-dropdown">
              <button class="user-create export-btn" id="logsExportBtn" type="button" disabled aria-label="Export log absensi" title="Pilih acara terlebih dahulu">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="display:inline;vertical-align:middle;margin-right:4px">
                  <path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M4 17v3h16v-3"/>
                </svg>
                Export ▾
              </button>
              <div class="export-menu">
                <button class="export-option" data-format="excel"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/><path d="M14 2v6h6"/><path d="M8 13l2 3 2-3"/><path d="M12 18v-6"/></svg> Excel (.xlsx)</button>
                <button class="export-option" data-format="pdf"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/><path d="M14 2v6h6"/><path d="M10 12h4"/><path d="M10 16h4"/><path d="M10 8h.01"/></svg> PDF (.pdf)</button>
              </div>
            </div>
          </div>
        </div>

        <div style="overflow-x:auto">
          <table class="absensi-log-table logs-table-full" id="logsTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Username</th>
                <th>Acara</th>
                <th>Absensi</th>
                <th>Status</th>
                <th>Catatan</th>
                <th>Waktu</th>
                <th style="width:80px">Aksi</th>
              </tr>
            </thead>
            <tbody id="logsBody"></tbody>
          </table>
        </div>

        <p class="user-empty" id="logsEmpty">Belum ada data absensi.</p>

        <div class="pagination" id="logsPagination"></div>
      </section>
    </main>
  </div>

  <script src="../../../scripts/config.js"></script>
  <script src="../../../scripts/shared.js"></script>
  <script src="../../../scripts/api.js"></script>
  <script src="../../../scripts/modal-factory.js"></script>
  <script src="../../../scripts/navbar.js"></script>
  <script src="../../../scripts/dashboard-home.js"></script>
  <script src="../../../scripts/user-manager.js"></script>
  <script src="../../../scripts/acara-manager.js"></script>
  <script src="../../../scripts/absensi-manager.js"></script>
  <script src="../../../scripts/logs-manager.js"></script>
  <script src="../../../scripts/profile.js"></script>
  <script src="../../../scripts/forum.js"></script>
  <script src="../../../scripts/dashboard.js"></script>
</body>
</html>
