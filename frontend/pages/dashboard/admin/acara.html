<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acara - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../styles/dashboard.css" />
</head>
<body class="is-loading" data-role="admin" data-page="acara">
  <div class="bg-noise"></div>

  <div class="loading-overlay" aria-live="polite">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <p>Memuat dashboard...</p>
    </div>
  </div>

  <div class="dashboard">
    <aside class="sidebar">
      <div class="profile">
        <div class="avatar" id="sidebarAvatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c2.2-3.2 5-4.8 8-4.8s5.8 1.6 8 4.8" />
          </svg>
        </div>
        <div class="profile-text">
          <p class="profile-name" id="profileName">Hi, Admin</p>
          <p class="profile-role" id="profileRole">Administrator</p>
        </div>
      </div>

      <div class="divider"></div>

      <nav class="side-nav" id="sideNav" aria-label="Menu dashboard"></nav>

      <div class="divider"></div>

      <div class="side-actions">
        <button class="side-link" type="button" data-action="home">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M3 11l9-8 9 8" />
              <path d="M5 10v10h14V10" />
              <path d="M9 20v-6h6v6" />
            </svg>
          </span>
          <span>Home</span>
        </button>
        <button class="side-link" type="button" data-action="exit">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M10 6h8v12h-8" />
              <path d="M6 12h12" />
              <path d="M6 12l3-3" />
              <path d="M6 12l3 3" />
            </svg>
          </span>
          <span>Exit</span>
        </button>
        <button class="side-link side-logout" type="button" data-action="logout">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
              <path d="M13 7V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h6a2 2 0 002-2v-2" />
            </svg>
          </span>
          <span>Log Out</span>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="main-header">
        <div>
          <h1 class="welcome-title" id="welcomeTitle">Acara</h1>
          <p class="welcome-subtitle" id="welcomeSubtitle">Kelola semua acara dan kegiatan.</p>
        </div>
        <div class="header-icon" id="headerIcon" aria-hidden="true"></div>
      </header>

      <div class="header-line"></div>

      <section class="role-panel">

        <!-- Search & Filter Bar -->
        <div class="section-header">
          <h2 class="section-title">Daftar Acara</h2>
          <div class="user-search">
            <label class="sr-only" for="acaraSearchInput">Cari acara</label>
            <div class="user-search-box">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="7" />
                <path d="M20 20l-3.5-3.5" />
              </svg>
              <input id="acaraSearchInput" type="search" placeholder="Cari judul acara..." autocomplete="off" />
            </div>

            <!-- Filter status dropdown -->
            <div class="acara-filter-wrap">
              <select id="acaraStatusFilter" class="acara-status-filter">
                <option value="">Semua Status</option>
                <option value="akan-datang">Akan Datang</option>
                <option value="berlangsung">Berlangsung</option>
                <option value="selesai">Selesai</option>
              </select>
            </div>

            <button class="user-search-clear" id="acaraSearchClear" type="button">Reset</button>

            <button class="user-create" id="acaraCreateBtn" type="button" aria-label="Buat acara baru">
              <span class="user-create-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 5v14" />
                  <path d="M5 12h14" />
                </svg>
              </span>
              <span>Buat Acara</span>
            </button>
            <div class="export-dropdown">
              <button class="user-create export-btn" id="acaraExportBtn" type="button" aria-label="Export acara">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="display:inline;vertical-align:middle;margin-right:4px">
                  <path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M4 17v3h16v-3"/>
                </svg>
                Export ▾
              </button>
              <div class="export-menu">
                <button class="export-option" data-format="excel"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/><path d="M14 2v6h6"/><path d="M8 13l2 3 2-3"/><path d="M12 18v-6"/></svg> Excel (.xlsx)</button>
                <button class="export-option" data-format="pdf"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/><path d="M14 2v6h6"/><path d="M10 12h4"/><path d="M10 16h4"/><path d="M10 8h.01"/></svg> PDF (.pdf)</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Acara List -->
        <div class="acara-list" id="acaraList"></div>

        <!-- Empty State -->
        <p class="user-empty" id="acaraEmpty">Belum ada acara yang dibuat.</p>

        <!-- Pagination -->
        <div class="pagination" id="acaraPagination"></div>

      </section>
    </main>
  </div>

  <script src="../../../scripts/config.js"></script>
  <script src="../../../scripts/dashboard.js"></script>
</body>
</html>
