<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hapus Akun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/delete-account.css" />
</head>
<body>

  <div class="bg-noise"></div>

  <main class="container">
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <h1 class="title">HAPUS AKUN</h1>
        <div class="title-bar"></div>
      </div>

      <!-- Warning -->
      <div class="warning-box">
        <p class="warning-text">
          <span class="warning-bold">WARNING</span> akun akan dihapus secara permanen.
        </p>
      </div>

      <!-- Body -->
      <div class="card-body">

        <p class="desc-text">
          Silahkan masukkan email untuk konfirmasi penghapusan akun.
        </p>

        <div class="input-group">
          <label for="confirmEmail" class="label">Konfirmasi Email</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="confirmEmail"
              name="confirmEmail"
              class="input-field"
              placeholder="contoh@email.com"
              autocomplete="email"
            />
          </div>
          <span class="error-msg" id="emailError"></span>
        </div>

        <!-- Buttons -->
        <div class="btn-row">
          <button class="btn btn-cancel" id="btnCancel" type="button">Batal</button>
          <button class="btn btn-delete" id="btnDelete" type="button">
            <span class="btn-text">Hapus Akun</span>
            <span class="btn-loader" id="btnLoader" aria-hidden="true"></span>
          </button>
        </div>

      </div>
    </div>
  </main>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0
               001.71 3h16.94a2 2 0 001.71-3L13.71
               3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <h2 class="modal-title" id="modalTitle">Yakin ingin menghapus?</h2>
      <p class="modal-desc">Tindakan ini <strong>tidak dapat dibatalkan</strong>. Akun dan semua datamu akan dihapus secara permanen.</p>
      <div class="modal-actions">
        <button class="btn btn-cancel" id="modalCancel" type="button">Tidak, Batal</button>
        <button class="btn btn-delete" id="modalConfirm" type="button">Ya, Hapus</button>
      </div>
    </div>
  </div>

  <script src="../../scripts/config.js"></script>
  <script src="../../scripts/shared.js"></script>
  <script src="../../scripts/api.js"></script>
  <script src="../../scripts/modal-factory.js"></script>
  <script src="../../scripts/delete-account.js"></script>
</body>
</html>
