<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/register.css" />
</head>
<body>

  <div class="bg-noise"></div>

  <main class="container">
    <div class="card">

      <div class="card-header">
        <h1 class="title">REGISTER</h1>
        <div class="title-bar"></div>
      </div>

      <div class="card-body">

        <!-- Email -->
        <div class="input-group">
          <label for="email" class="label">Email</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="email"
              name="email"
              class="input-field"
              placeholder="contoh@email.com"
              autocomplete="email"
            />
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                   viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0
                     002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </span>
          </div>
          <span class="error-msg" id="emailError"></span>
        </div>

        <!-- Username -->
        <div class="input-group">
          <label for="username" class="label">Username</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              name="username"
              class="input-field"
              placeholder="Maksimal 10 karakter"
              autocomplete="username"
            />
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                   viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7
                     7h14a7 7 0 00-7-7z"/>
              </svg>
            </span>
          </div>
          <span class="error-msg" id="usernameError"></span>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label for="password" class="label">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="input-field"
              placeholder="Minimal 8 karakter"
              autocomplete="new-password"
            />
            <button type="button" class="input-icon toggle-password"
                    id="togglePassword" aria-label="Tampilkan password">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                   fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
                     9.542 7-1.274 4.057-5.064 7-9.542 7-4.477
                     0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="passwordError"></span>

          <!-- Password strength bar -->
          <div class="strength-bar-wrap" id="strengthWrap">
            <div class="strength-bar" id="strengthBar"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>

        <button class="btn-primary" id="submitBtn" type="button">
          <span class="btn-text">Register</span>
          <span class="btn-loader" id="btnLoader" aria-hidden="true"></span>
        </button>

        <p class="bottom-text">
          Punya akun? <a href="login.html" class="nav-link">Login</a>
        </p>

      </div>
    </div>
  </main>

  <script src="../../scripts/register.js"></script>
</body>
</html>
