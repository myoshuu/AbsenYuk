<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../styles/login.css" />
</head>
<body>

  <div class="bg-noise"></div>

  <main class="min-vh-100 d-flex justify-content-center align-items-center p-3" style="position:relative;z-index:1;">
    <div class="card border-0" style="max-width:420px;width:100%;">

      <div class="card-header bg-transparent border-0 text-center pt-5 pb-0">
        <h1 class="title h2 mb-3">LOGIN</h1>
        <div class="title-bar mx-auto"></div>
      </div>

      <div class="card-body px-4 pb-4 pt-3">

        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label label text-uppercase">Email</label>
          <div class="position-relative">
            <input
              type="email"
              id="email"
              name="email"
              class="form-control input-field"
              placeholder="contoh@email.com"
              autocomplete="email"
            />
            <span class="input-icon position-absolute top-50 end-0 translate-middle-y pe-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                   viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0
                     002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </span>
          </div>
          <span class="error-msg" id="emailError"></span>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label label text-uppercase">Password</label>
          <div class="position-relative">
            <input
              type="password"
              id="password"
              name="password"
              class="form-control input-field"
              placeholder="Minimal 8 karakter"
              autocomplete="current-password"
            />
            <button type="button" class="input-icon toggle-password position-absolute top-50 end-0 translate-middle-y pe-3"
                    id="togglePassword" aria-label="Tampilkan password">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                   fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
                     9.542 7-1.274 4.057-5.064 7-9.542 7-4.477
                     0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="passwordError"></span>
        </div>

        <button class="btn btn-dark w-100 py-3 btn-primary fw-bold" id="submitBtn" type="button">
          <span class="btn-text">Login</span>
          <span class="btn-loader" id="btnLoader" aria-hidden="true"></span>
        </button>

        <p class="bottom-text text-center mt-3">
          Belum punya akun? <a href="register.html" class="nav-link fw-bold">Register</a>
        </p>

      </div>
    </div>
  </main>

  <script src="../../scripts/config.js"></script>
  <script src="../../scripts/login.js"></script>
</body>
</html>
